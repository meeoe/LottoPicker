<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로또 번호 생성기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- 메인 카드 -->
    <div class="card">
      <!-- 타이틀 -->
      <div class="section">
        <h1><span>로또</span> 번호 생성기</h1>
      </div>

      <hr class="divider" />

      <!-- 탭 바 -->
      <div class="tab-bar">
        <button class="tab active" id="tab-fixed" onclick="switchTab('fixed')">
          고정번호 설정
        </button>
        <button class="tab" id="tab-popular" onclick="switchTab('popular')">
          인기번호
        </button>
      </div>

      <!-- 고정번호 패널 -->
      <div id="fixed-panel">
        <div class="section">
          <div class="fixed-panel-header">
            <p class="fixed-info">
              <span id="fixedCount">0</span> / 5개 선택됨
            </p>
            <button class="reset-btn" onclick="resetFixed()">전체 해제</button>
          </div>
          <div class="number-grid" id="numberGrid"></div>
        </div>
        <hr class="divider" />
        <div class="section">
          <p class="section-title" style="margin-bottom: 4px">
            나머지 번호 추첨 방식
          </p>
          <p style="font-size: 13px; color: #aaa; margin-bottom: 0">
            고정번호 외 나머지를 어떻게 뽑을지 선택하세요.
          </p>
          <div class="mode-bar">
            <button class="mode-btn active" data-mode="random" onclick="setDrawMode('random')">
              완전 랜덤
              <span class="mode-desc">1~45 균등 추첨</span>
            </button>
            <button class="mode-btn" data-mode="weighted" onclick="setDrawMode('weighted')">
              인기번호 가중치
              <span class="mode-desc">자주 나온 번호 우선</span>
            </button>
            <button class="mode-btn" data-mode="toppool" onclick="setDrawMode('toppool')">
              상위 20개 풀
              <span class="mode-desc">TOP 20 안에서만</span>
            </button>
          </div>
        </div>
      </div>

      <!-- 인기번호 패널 -->
      <div id="popular-panel" style="display: none">
        <div class="section">
          <div class="popular-panel-header">
            <p class="section-title">역대 인기번호 TOP 20</p>
            <button class="update-btn" id="updateBtn" onclick="triggerUpdate()">
              최신 데이터 업데이트
            </button>
          </div>
          <div class="freq-status" id="freqStatus"></div>
          <div id="freqChart"></div>
        </div>
        <hr class="divider" />
        <div class="section">
          <p class="section-title" style="margin-bottom: 4px">추첨 방식</p>
          <p style="font-size: 13px; color: #aaa; margin-bottom: 0">
            선택한 방식은 모든 탭에서 번호 생성 시 적용됩니다.
          </p>
          <div class="mode-bar">
            <button class="mode-btn active" data-mode="random" onclick="setDrawMode('random')">
              완전 랜덤
              <span class="mode-desc">1~45 균등 추첨</span>
            </button>
            <button class="mode-btn" data-mode="weighted" onclick="setDrawMode('weighted')">
              인기번호 가중치
              <span class="mode-desc">자주 나온 번호 우선</span>
            </button>
            <button class="mode-btn" data-mode="toppool" onclick="setDrawMode('toppool')">
              상위 20개 풀
              <span class="mode-desc">TOP 20 안에서만</span>
            </button>
          </div>
        </div>
      </div>

      <hr class="divider" />

      <!-- 세트 수 + 생성 버튼 -->
      <div class="section">
        <div class="set-row" style="margin-bottom: 1.4rem;">
          <p class="section-title">생성할 세트 수</p>
          <select class="set-select" id="setSelect">
            <option value="1">1세트</option>
            <option value="2">2세트</option>
            <option value="3">3세트</option>
            <option value="4">4세트</option>
            <option value="5">5세트</option>
          </select>
        </div>
        <div class="filter-row">
          <span class="filter-label">
            통계 조건 적용
            <span class="filter-desc">합계 100~175 · 홀짝 균형</span>
          </span>
          <label class="toggle-switch">
            <input type="checkbox" id="statFilter" onchange="setStatFilter(this.checked)" />
            <span class="toggle-slider"></span>
          </label>
        </div>
        <button class="generate-btn" onclick="generate()">번호 생성하기</button>
      </div>
    </div>

    <!-- 결과 카드 (동적 생성) -->
    <div id="resultCard"></div>

    <script src="script.js"></script>
  </body>
</html>
